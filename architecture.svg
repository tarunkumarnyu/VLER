<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 580" font-family="'Times New Roman', 'CMU Serif', Georgia, serif">
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="none" stroke="#222" stroke-width="0.8"/>
    </marker>
    <marker id="arr-dash" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="none" stroke="#888" stroke-width="0.8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="580" fill="#fff"/>

  <!-- ══════ SENSOR LAYER ══════ -->
  <text x="30" y="28" fill="#222" font-size="10" font-style="italic">Sensor Layer</text>

  <rect x="30" y="38" width="145" height="48" rx="2" fill="none" stroke="#222" stroke-width="1"/>
  <text x="102" y="57" text-anchor="middle" fill="#222" font-size="11" font-weight="bold">RPLIDAR C1</text>
  <text x="102" y="73" text-anchor="middle" fill="#555" font-size="9">2D LiDAR, 360°, 16 m</text>

  <rect x="205" y="38" width="155" height="48" rx="2" fill="none" stroke="#222" stroke-width="1"/>
  <text x="282" y="57" text-anchor="middle" fill="#222" font-size="11" font-weight="bold">RealSense D435i</text>
  <text x="282" y="73" text-anchor="middle" fill="#555" font-size="9">RGB-D, 640×480, 30 fps</text>

  <rect x="390" y="38" width="145" height="48" rx="2" fill="none" stroke="#222" stroke-width="1"/>
  <text x="462" y="57" text-anchor="middle" fill="#222" font-size="11" font-weight="bold">Wheel Encoders</text>
  <text x="462" y="73" text-anchor="middle" fill="#555" font-size="9">Diff. drive odometry</text>

  <rect x="565" y="38" width="220" height="48" rx="2" fill="none" stroke="#222" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="675" y="57" text-anchor="middle" fill="#222" font-size="11" font-weight="bold">NRF24L01 Receiver</text>
  <text x="675" y="73" text-anchor="middle" fill="#555" font-size="9">2.4 GHz, room trigger, 98% pkt rate</text>

  <!-- ══════ COMPUTE LAYER ══════ -->
  <text x="30" y="120" fill="#222" font-size="10" font-style="italic">Compute Layer — Raspberry Pi 5, Ubuntu 22.04, ROS 2 Humble</text>

  <!-- Dashed enclosure -->
  <rect x="20" y="130" width="560" height="220" rx="3" fill="none" stroke="#999" stroke-width="0.8" stroke-dasharray="5,3"/>

  <!-- SLAM Toolbox -->
  <rect x="40" y="148" width="155" height="55" rx="2" fill="#f5f5f5" stroke="#222" stroke-width="1"/>
  <text x="117" y="170" text-anchor="middle" fill="#222" font-size="11" font-weight="bold">SLAM Toolbox</text>
  <text x="117" y="184" text-anchor="middle" fill="#555" font-size="9">Correlative scan matching</text>
  <text x="117" y="196" text-anchor="middle" fill="#555" font-size="9">2D occupancy grid, 20 Hz</text>

  <!-- RTAB-Map -->
  <rect x="225" y="148" width="155" height="55" rx="2" fill="#f5f5f5" stroke="#222" stroke-width="1"/>
  <text x="302" y="170" text-anchor="middle" fill="#222" font-size="11" font-weight="bold">RTAB-Map</text>
  <text x="302" y="184" text-anchor="middle" fill="#555" font-size="9">3D point cloud mapping</text>
  <text x="302" y="196" text-anchor="middle" fill="#555" font-size="9">Loop closure (KD-tree)</text>

  <!-- Nav2 -->
  <rect x="410" y="148" width="155" height="55" rx="2" fill="#f5f5f5" stroke="#222" stroke-width="1"/>
  <text x="487" y="170" text-anchor="middle" fill="#222" font-size="11" font-weight="bold">Nav2</text>
  <text x="487" y="184" text-anchor="middle" fill="#555" font-size="9">A* global planner</text>
  <text x="487" y="196" text-anchor="middle" fill="#555" font-size="9">DWA local planner</text>

  <!-- ROS nodes -->
  <rect x="40" y="222" width="100" height="30" rx="2" fill="none" stroke="#888" stroke-width="0.7"/>
  <text x="90" y="241" text-anchor="middle" fill="#555" font-size="9" font-style="italic">odometry_node</text>

  <rect x="155" y="222" width="100" height="30" rx="2" fill="none" stroke="#888" stroke-width="0.7"/>
  <text x="205" y="241" text-anchor="middle" fill="#555" font-size="9" font-style="italic">map_manager</text>

  <rect x="270" y="222" width="100" height="30" rx="2" fill="none" stroke="#888" stroke-width="0.7"/>
  <text x="320" y="241" text-anchor="middle" fill="#555" font-size="9" font-style="italic">room_selector</text>

  <rect x="385" y="222" width="90" height="30" rx="2" fill="none" stroke="#888" stroke-width="0.7"/>
  <text x="430" y="241" text-anchor="middle" fill="#555" font-size="9" font-style="italic">costmap_2d</text>

  <rect x="490" y="222" width="80" height="30" rx="2" fill="none" stroke="#888" stroke-width="0.7"/>
  <text x="530" y="241" text-anchor="middle" fill="#555" font-size="9" font-style="italic">bt_navigator</text>

  <!-- nrf_receiver (outside compute box) -->
  <rect x="610" y="148" width="180" height="55" rx="2" fill="none" stroke="#222" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="700" y="170" text-anchor="middle" fill="#222" font-size="11" font-weight="bold">nrf_receiver</text>
  <text x="700" y="184" text-anchor="middle" fill="#555" font-size="9">Room command Rx</text>
  <text x="700" y="196" text-anchor="middle" fill="#555" font-size="9">Arduino Uno #2, USB serial</text>

  <!-- ══════ ARROWS: Sensors → Compute ══════ -->
  <line x1="102" y1="86" x2="102" y2="144" stroke="#222" stroke-width="0.8" marker-end="url(#arr)"/>
  <line x1="282" y1="86" x2="282" y2="144" stroke="#222" stroke-width="0.8" marker-end="url(#arr)"/>
  <path d="M462,86 L462,110 L90,110 L90,144" fill="none" stroke="#222" stroke-width="0.8" marker-end="url(#arr)"/>
  <line x1="675" y1="86" x2="700" y2="144" stroke="#888" stroke-width="0.8" stroke-dasharray="4,2" marker-end="url(#arr-dash)"/>

  <!-- ══════ ARROWS: Internal ══════ -->
  <line x1="195" y1="175" x2="221" y2="175" stroke="#222" stroke-width="0.8" marker-end="url(#arr)"/>
  <line x1="380" y1="175" x2="406" y2="175" stroke="#222" stroke-width="0.8" marker-end="url(#arr)"/>
  <line x1="610" y1="175" x2="569" y2="175" stroke="#888" stroke-width="0.8" stroke-dasharray="4,2" marker-end="url(#arr-dash)"/>

  <!-- Labels on arrows -->
  <text x="208" y="168" text-anchor="middle" fill="#888" font-size="7">map</text>
  <text x="393" y="168" text-anchor="middle" fill="#888" font-size="7">costmap</text>
  <text x="590" y="168" text-anchor="middle" fill="#888" font-size="7">goal</text>

  <!-- ══════ ACTUATOR LAYER ══════ -->
  <text x="30" y="290" fill="#222" font-size="10" font-style="italic">Actuator Layer</text>

  <rect x="40" y="300" width="180" height="48" rx="2" fill="none" stroke="#222" stroke-width="1"/>
  <text x="130" y="319" text-anchor="middle" fill="#222" font-size="11" font-weight="bold">Arduino Uno #1</text>
  <text x="130" y="335" text-anchor="middle" fill="#555" font-size="9">Motor control, encoder readout</text>

  <rect x="260" y="300" width="180" height="48" rx="2" fill="none" stroke="#222" stroke-width="1"/>
  <text x="350" y="319" text-anchor="middle" fill="#222" font-size="11" font-weight="bold">Differential Drive</text>
  <text x="350" y="335" text-anchor="middle" fill="#555" font-size="9">2× DC, 10:1 gear, caster wheels</text>

  <!-- Nav2 → Arduino → Drive -->
  <path d="M487,203 L487,270 L130,270 L130,296" fill="none" stroke="#222" stroke-width="0.8" marker-end="url(#arr)"/>
  <text x="490" y="265" fill="#888" font-size="7">cmd_vel</text>
  <line x1="220" y1="324" x2="256" y2="324" stroke="#222" stroke-width="0.8" marker-end="url(#arr)"/>
  <text x="238" y="318" fill="#888" font-size="7">PWM</text>

  <!-- ══════ STATE MACHINE ══════ -->
  <text x="30" y="390" fill="#222" font-size="10" font-style="italic">Navigation State Machine</text>

  <!-- States -->
  <rect x="40" y="405" width="80" height="32" rx="16" fill="none" stroke="#222" stroke-width="1"/>
  <text x="80" y="425" text-anchor="middle" fill="#222" font-size="10">Idle</text>

  <rect x="160" y="405" width="80" height="32" rx="16" fill="none" stroke="#222" stroke-width="1"/>
  <text x="200" y="425" text-anchor="middle" fill="#222" font-size="10">Receive</text>

  <rect x="280" y="405" width="80" height="32" rx="16" fill="none" stroke="#222" stroke-width="1"/>
  <text x="320" y="425" text-anchor="middle" fill="#222" font-size="10">Validate</text>

  <rect x="400" y="405" width="80" height="32" rx="16" fill="none" stroke="#222" stroke-width="1"/>
  <text x="440" y="425" text-anchor="middle" fill="#222" font-size="10">Navigate</text>

  <rect x="520" y="405" width="80" height="32" rx="16" fill="none" stroke="#222" stroke-width="1"/>
  <text x="560" y="425" text-anchor="middle" fill="#222" font-size="10">Arrived</text>

  <rect x="660" y="405" width="80" height="32" rx="16" fill="none" stroke="#222" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="700" y="425" text-anchor="middle" fill="#222" font-size="10">Error</text>

  <!-- State arrows -->
  <line x1="120" y1="421" x2="156" y2="421" stroke="#222" stroke-width="0.8" marker-end="url(#arr)"/>
  <line x1="240" y1="421" x2="276" y2="421" stroke="#222" stroke-width="0.8" marker-end="url(#arr)"/>
  <line x1="360" y1="421" x2="396" y2="421" stroke="#222" stroke-width="0.8" marker-end="url(#arr)"/>
  <line x1="480" y1="421" x2="516" y2="421" stroke="#222" stroke-width="0.8" marker-end="url(#arr)"/>

  <!-- Error path -->
  <path d="M440,437 L440,460 L700,460 L700,441" fill="none" stroke="#888" stroke-width="0.8" stroke-dasharray="4,2" marker-end="url(#arr-dash)"/>
  <text x="570" y="455" text-anchor="middle" fill="#888" font-size="7">timeout / fault</text>

  <!-- ══════ FIGURE CAPTION ══════ -->
  <text x="410" y="510" text-anchor="middle" fill="#222" font-size="10" font-weight="bold">Fig. 1.</text>
  <text x="410" y="524" text-anchor="middle" fill="#555" font-size="10">System architecture of the VLER platform. Solid lines indicate synchronous data flow;</text>
  <text x="410" y="538" text-anchor="middle" fill="#555" font-size="10">dashed lines indicate asynchronous command interfaces. The compute layer runs entirely</text>
  <text x="410" y="552" text-anchor="middle" fill="#555" font-size="10">on ROS 2 Humble with SLAM Toolbox for localization and Nav2 for path planning.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 720" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#333" stroke-width="1" stroke-linejoin="round" stroke-linecap="round"/>
    </marker>
    <marker id="arr-dash" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#888" stroke-width="1" stroke-linejoin="round" stroke-linecap="round"/>
    </marker>
  </defs>

  <rect width="820" height="720" fill="#fff"/>

  <!-- ══════════ SENSOR LAYER ══════════ -->
  <text x="32" y="32" fill="#333" font-size="13" font-weight="600">Sensor layer</text>

  <!-- RPLIDAR C1 -->
  <rect x="32" y="50" width="168" height="60" rx="8" fill="#EBF5FF" stroke="#4A90D9" stroke-width="1"/>
  <text x="116" y="74" text-anchor="middle" fill="#1A5694" font-size="13" font-weight="600">RPLIDAR C1</text>
  <text x="116" y="94" text-anchor="middle" fill="#4A78A5" font-size="10">360° scan, 16 m range</text>

  <!-- RealSense D435i -->
  <rect x="220" y="50" width="168" height="60" rx="8" fill="#EBF5FF" stroke="#4A90D9" stroke-width="1"/>
  <text x="304" y="74" text-anchor="middle" fill="#1A5694" font-size="13" font-weight="600">RealSense D435i</text>
  <text x="304" y="94" text-anchor="middle" fill="#4A78A5" font-size="10">RGB-D, 640×480, 30 fps</text>

  <!-- Wheel Encoders -->
  <rect x="408" y="50" width="168" height="60" rx="8" fill="#EBF5FF" stroke="#4A90D9" stroke-width="1"/>
  <text x="492" y="74" text-anchor="middle" fill="#1A5694" font-size="13" font-weight="600">Wheel Encoders</text>
  <text x="492" y="94" text-anchor="middle" fill="#4A78A5" font-size="10">Diff. drive odometry</text>

  <!-- NRF24L01 Receiver -->
  <rect x="616" y="50" width="172" height="60" rx="8" fill="#F3EEFE" stroke="#8B72BE" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="702" y="74" text-anchor="middle" fill="#4E3D80" font-size="13" font-weight="600">NRF24L01 Rx</text>
  <text x="702" y="94" text-anchor="middle" fill="#7A6BA0" font-size="10">2.4 GHz, 98% pkt rate</text>

  <!-- ══════════ ARROWS: Sensors → Compute ══════════ -->
  <!-- RPLIDAR → SLAM Toolbox (straight down, aligned) -->
  <line x1="116" y1="110" x2="116" y2="210" stroke="#333" stroke-width="1" marker-end="url(#arr)"/>

  <!-- RealSense → RTAB-Map (straight down, aligned) -->
  <line x1="304" y1="110" x2="306" y2="210" stroke="#333" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Wheel Encoders → SLAM Toolbox (L-bend with /odom pill) -->
  <path d="M492,110 L492,156 L116,156 L116,210" fill="none" stroke="#333" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="466" y="136" width="52" height="20" rx="10" fill="#fff" stroke="#bbb" stroke-width="0.8"/>
  <text x="492" y="150" text-anchor="middle" fill="#666" font-size="10">/odom</text>

  <!-- NRF24L01 → nrf_receiver (straight down, dashed) -->
  <line x1="702" y1="110" x2="702" y2="210" stroke="#888" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arr-dash)"/>

  <!-- ══════════ COMPUTE LAYER ══════════ -->
  <text x="32" y="186" fill="#333" font-size="13" font-weight="600">Compute layer</text>
  <text x="155" y="186" fill="#888" font-size="11">Raspberry Pi 5 · Ubuntu 22.04 · ROS 2 Humble</text>

  <!-- Dashed enclosure -->
  <rect x="24" y="196" width="556" height="176" rx="10" fill="none" stroke="#bbb" stroke-width="0.8" stroke-dasharray="6,3"/>

  <!-- SLAM Toolbox -->
  <rect x="40" y="214" width="168" height="64" rx="8" fill="#E6F7F0" stroke="#1D9E75" stroke-width="1"/>
  <text x="124" y="240" text-anchor="middle" fill="#085041" font-size="13" font-weight="600">SLAM Toolbox</text>
  <text x="124" y="260" text-anchor="middle" fill="#3A8A6E" font-size="10">Correlative scan match, 20 Hz</text>

  <!-- RTAB-Map -->
  <rect x="224" y="214" width="168" height="64" rx="8" fill="#E6F7F0" stroke="#1D9E75" stroke-width="1"/>
  <text x="308" y="240" text-anchor="middle" fill="#085041" font-size="13" font-weight="600">RTAB-Map</text>
  <text x="308" y="260" text-anchor="middle" fill="#3A8A6E" font-size="10">3D point cloud, loop closure</text>

  <!-- Nav2 -->
  <rect x="408" y="214" width="160" height="64" rx="8" fill="#FFF0E8" stroke="#D85A30" stroke-width="1"/>
  <text x="488" y="240" text-anchor="middle" fill="#712B13" font-size="13" font-weight="600">Nav2</text>
  <text x="488" y="260" text-anchor="middle" fill="#A86040" font-size="10">A* global + DWA local</text>

  <!-- nrf_receiver (outside enclosure) -->
  <rect x="616" y="214" width="172" height="64" rx="8" fill="#F3EEFE" stroke="#8B72BE" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="702" y="240" text-anchor="middle" fill="#4E3D80" font-size="13" font-weight="600">nrf_receiver</text>
  <text x="702" y="260" text-anchor="middle" fill="#7A6BA0" font-size="10">Arduino #2 · USB serial</text>

  <!-- Internal arrows with pill labels -->
  <!-- SLAM → RTAB-Map -->
  <line x1="208" y1="246" x2="220" y2="246" stroke="#333" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="192" y="226" width="38" height="20" rx="10" fill="#fff" stroke="#bbb" stroke-width="0.8"/>
  <text x="211" y="240" text-anchor="middle" fill="#666" font-size="10">map</text>

  <!-- RTAB-Map → Nav2 -->
  <line x1="392" y1="246" x2="404" y2="246" stroke="#333" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="373" y="226" width="58" height="20" rx="10" fill="#fff" stroke="#bbb" stroke-width="0.8"/>
  <text x="402" y="240" text-anchor="middle" fill="#666" font-size="10">costmap</text>

  <!-- nrf_receiver → Nav2 (goal, dashed) -->
  <line x1="612" y1="246" x2="572" y2="246" stroke="#888" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arr-dash)"/>
  <rect x="576" y="226" width="38" height="20" rx="10" fill="#fff" stroke="#bbb" stroke-width="0.8"/>
  <text x="595" y="240" text-anchor="middle" fill="#666" font-size="10">goal</text>

  <!-- ROS Nodes row -->
  <rect x="40" y="296" width="98" height="30" rx="6" fill="#F5F5F2" stroke="#C4C4BE" stroke-width="0.8"/>
  <text x="89" y="315" text-anchor="middle" fill="#666" font-size="10" font-style="italic">odometry_node</text>

  <rect x="148" y="296" width="98" height="30" rx="6" fill="#F5F5F2" stroke="#C4C4BE" stroke-width="0.8"/>
  <text x="197" y="315" text-anchor="middle" fill="#666" font-size="10" font-style="italic">map_manager</text>

  <rect x="256" y="296" width="98" height="30" rx="6" fill="#F5F5F2" stroke="#C4C4BE" stroke-width="0.8"/>
  <text x="305" y="315" text-anchor="middle" fill="#666" font-size="10" font-style="italic">room_selector</text>

  <rect x="364" y="296" width="90" height="30" rx="6" fill="#F5F5F2" stroke="#C4C4BE" stroke-width="0.8"/>
  <text x="409" y="315" text-anchor="middle" fill="#666" font-size="10" font-style="italic">costmap_2d</text>

  <rect x="464" y="296" width="90" height="30" rx="6" fill="#F5F5F2" stroke="#C4C4BE" stroke-width="0.8"/>
  <text x="509" y="315" text-anchor="middle" fill="#666" font-size="10" font-style="italic">bt_navigator</text>

  <!-- ══════════ ACTUATOR LAYER ══════════ -->
  <text x="32" y="416" fill="#333" font-size="13" font-weight="600">Actuator layer</text>

  <rect x="100" y="430" width="200" height="60" rx="8" fill="#F5F5F2" stroke="#888" stroke-width="1"/>
  <text x="200" y="454" text-anchor="middle" fill="#333" font-size="13" font-weight="600">Arduino Uno #1</text>
  <text x="200" y="474" text-anchor="middle" fill="#777" font-size="10">Motor control · encoder readout</text>

  <rect x="360" y="430" width="200" height="60" rx="8" fill="#F5F5F2" stroke="#888" stroke-width="1"/>
  <text x="460" y="454" text-anchor="middle" fill="#333" font-size="13" font-weight="600">Differential Drive</text>
  <text x="460" y="474" text-anchor="middle" fill="#777" font-size="10">2× DC motors · 10:1 · casters</text>

  <!-- Nav2 → Arduino (cmd_vel) — routes below compute enclosure -->
  <path d="M488,278 L488,394 L200,394 L200,426" fill="none" stroke="#333" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="462" y="384" width="56" height="20" rx="10" fill="#fff" stroke="#bbb" stroke-width="0.8"/>
  <text x="490" y="398" text-anchor="middle" fill="#666" font-size="10">cmd_vel</text>

  <!-- Arduino → Drive (PWM) -->
  <line x1="300" y1="460" x2="356" y2="460" stroke="#333" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="308" y="442" width="42" height="20" rx="10" fill="#fff" stroke="#bbb" stroke-width="0.8"/>
  <text x="329" y="456" text-anchor="middle" fill="#666" font-size="10">PWM</text>

  <!-- ══════════ STATE MACHINE ══════════ -->
  <text x="32" y="536" fill="#333" font-size="13" font-weight="600">Navigation state machine</text>

  <!-- Idle -->
  <rect x="40" y="554" width="94" height="38" rx="19" fill="#F5F5F2" stroke="#888" stroke-width="1"/>
  <text x="87" y="577" text-anchor="middle" fill="#444" font-size="12">Idle</text>

  <!-- Receive -->
  <rect x="164" y="554" width="94" height="38" rx="19" fill="#F3EEFE" stroke="#8B72BE" stroke-width="1"/>
  <text x="211" y="577" text-anchor="middle" fill="#4E3D80" font-size="12">Receive</text>

  <!-- Validate -->
  <rect x="288" y="554" width="94" height="38" rx="19" fill="#E6F7F0" stroke="#1D9E75" stroke-width="1"/>
  <text x="335" y="577" text-anchor="middle" fill="#085041" font-size="12">Validate</text>

  <!-- Navigate -->
  <rect x="412" y="554" width="94" height="38" rx="19" fill="#FFF0E8" stroke="#D85A30" stroke-width="1"/>
  <text x="459" y="577" text-anchor="middle" fill="#712B13" font-size="12">Navigate</text>

  <!-- Arrived -->
  <rect x="536" y="554" width="94" height="38" rx="19" fill="#E6F7F0" stroke="#1D9E75" stroke-width="1"/>
  <text x="583" y="577" text-anchor="middle" fill="#085041" font-size="12">Arrived</text>

  <!-- Error -->
  <rect x="688" y="554" width="84" height="38" rx="19" fill="#FCEBEB" stroke="#C44" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="730" y="577" text-anchor="middle" fill="#791F1F" font-size="12">Error</text>

  <!-- State transition arrows -->
  <line x1="134" y1="573" x2="160" y2="573" stroke="#333" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="258" y1="573" x2="284" y2="573" stroke="#333" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="382" y1="573" x2="408" y2="573" stroke="#333" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="506" y1="573" x2="532" y2="573" stroke="#333" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Error path -->
  <path d="M459,592 L459,616 L730,616 L730,596" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arr-dash)"/>
  <rect x="564" y="606" width="86" height="20" rx="10" fill="#fff" stroke="#bbb" stroke-width="0.8"/>
  <text x="607" y="620" text-anchor="middle" fill="#666" font-size="10">timeout / fault</text>

  <!-- ══════════ LEGEND ══════════ -->
  <g transform="translate(32,670)">
    <line x1="0" y1="8" x2="30" y2="8" stroke="#333" stroke-width="1"/>
    <text x="38" y="12" fill="#666" font-size="10">Synchronous</text>
    <line x1="130" y1="8" x2="160" y2="8" stroke="#888" stroke-width="1" stroke-dasharray="5,3"/>
    <text x="168" y="12" fill="#666" font-size="10">Asynchronous</text>

    <rect x="270" y="1" width="14" height="14" rx="3" fill="#EBF5FF" stroke="#4A90D9" stroke-width="0.8"/>
    <text x="292" y="12" fill="#666" font-size="10">Sensors</text>
    <rect x="350" y="1" width="14" height="14" rx="3" fill="#E6F7F0" stroke="#1D9E75" stroke-width="0.8"/>
    <text x="372" y="12" fill="#666" font-size="10">SLAM / mapping</text>
    <rect x="466" y="1" width="14" height="14" rx="3" fill="#FFF0E8" stroke="#D85A30" stroke-width="0.8"/>
    <text x="488" y="12" fill="#666" font-size="10">Navigation</text>
    <rect x="562" y="1" width="14" height="14" rx="3" fill="#F3EEFE" stroke="#8B72BE" stroke-width="0.8"/>
    <text x="584" y="12" fill="#666" font-size="10">Wireless</text>
    <rect x="640" y="1" width="14" height="14" rx="3" fill="#FCEBEB" stroke="#C44" stroke-width="0.8"/>
    <text x="662" y="12" fill="#666" font-size="10">Error</text>
  </g>

  <!-- ══════════ CAPTION ══════════ -->
  <text x="410" y="710" text-anchor="middle" fill="#333" font-size="12" font-weight="600">Fig. 1 — System architecture of the VLER platform</text>
</svg>

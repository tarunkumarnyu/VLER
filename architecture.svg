<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" rx="12" fill="#0f172a"/>

  <!-- Sensors Section -->
  <rect x="30" y="20" width="840" height="100" rx="8" fill="none" stroke="#334155" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="50" y="42" fill="#94a3b8" font-size="12" font-weight="500">Sensors</text>

  <!-- RPLIDAR -->
  <rect x="120" y="55" width="160" height="48" rx="8" fill="#065f46" filter="url(#shadow)"/>
  <text x="200" y="75" fill="#a7f3d0" font-size="13" font-weight="600" text-anchor="middle">RPLIDAR C1</text>
  <text x="200" y="92" fill="#6ee7b7" font-size="10" text-anchor="middle">2D LiDAR · 360° · 16m</text>

  <!-- RealSense -->
  <rect x="370" y="55" width="160" height="48" rx="8" fill="#1e3a5f" filter="url(#shadow)"/>
  <text x="450" y="75" fill="#93c5fd" font-size="13" font-weight="600" text-anchor="middle">RealSense D435i</text>
  <text x="450" y="92" fill="#60a5fa" font-size="10" text-anchor="middle">RGB-D · Point Cloud</text>

  <!-- Wheel Encoders -->
  <rect x="620" y="55" width="160" height="48" rx="8" fill="#4a1d6a" filter="url(#shadow)"/>
  <text x="700" y="75" fill="#d8b4fe" font-size="13" font-weight="600" text-anchor="middle">Wheel Encoders</text>
  <text x="700" y="92" fill="#c084fc" font-size="10" text-anchor="middle">Odometry · Differential Drive</text>

  <!-- Arrows from sensors -->
  <line x1="200" y1="103" x2="200" y2="155" stroke="#6ee7b7" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <line x1="450" y1="103" x2="450" y2="155" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="700" y1="103" x2="700" y2="155" stroke="#c084fc" stroke-width="1.5" marker-end="url(#arrowPurple)"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6ee7b7"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#60a5fa"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#c084fc"/>
    </marker>
    <marker id="arrowWhite" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#cbd5e1"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#fdba74"/>
    </marker>
  </defs>

  <!-- ROS 2 Processing Section -->
  <rect x="30" y="140" width="840" height="160" rx="8" fill="none" stroke="#334155" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="50" y="162" fill="#94a3b8" font-size="12" font-weight="500">Raspberry Pi 5 · Ubuntu 22.04 · ROS 2 Humble</text>

  <!-- SLAM Toolbox -->
  <rect x="80" y="175" width="170" height="48" rx="8" fill="#1a2744" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="165" y="195" fill="#93c5fd" font-size="13" font-weight="600" text-anchor="middle">SLAM Toolbox</text>
  <text x="165" y="212" fill="#64748b" font-size="10" text-anchor="middle">2D Occupancy Grid</text>

  <!-- RTAB-Map -->
  <rect x="280" y="175" width="170" height="48" rx="8" fill="#1a2744" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="365" y="195" fill="#93c5fd" font-size="13" font-weight="600" text-anchor="middle">RTAB-Map</text>
  <text x="365" y="212" fill="#64748b" font-size="10" text-anchor="middle">3D Point Cloud</text>

  <!-- Nav2 -->
  <rect x="480" y="175" width="170" height="48" rx="8" fill="#1a2744" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="565" y="195" fill="#fcd34d" font-size="13" font-weight="600" text-anchor="middle">Nav2</text>
  <text x="565" y="212" fill="#64748b" font-size="10" text-anchor="middle">A* + DWA Planner</text>

  <!-- NRF Receiver -->
  <rect x="680" y="175" width="170" height="48" rx="8" fill="#1a2744" stroke="#f97316" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="765" y="195" fill="#fdba74" font-size="13" font-weight="600" text-anchor="middle">nrf_receiver</text>
  <text x="765" y="212" fill="#64748b" font-size="10" text-anchor="middle">Room Command Rx</text>

  <!-- Custom Nodes Row -->
  <rect x="80" y="245" width="170" height="36" rx="6" fill="#172033" stroke="#475569" stroke-width="1"/>
  <text x="165" y="268" fill="#94a3b8" font-size="11" font-weight="500" text-anchor="middle">odometry_node</text>

  <rect x="280" y="245" width="170" height="36" rx="6" fill="#172033" stroke="#475569" stroke-width="1"/>
  <text x="365" y="268" fill="#94a3b8" font-size="11" font-weight="500" text-anchor="middle">map_manager</text>

  <rect x="480" y="245" width="170" height="36" rx="6" fill="#172033" stroke="#475569" stroke-width="1"/>
  <text x="565" y="268" fill="#94a3b8" font-size="11" font-weight="500" text-anchor="middle">room_selector</text>

  <!-- Arrows between processing nodes -->
  <line x1="250" y1="199" x2="280" y2="199" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowWhite)"/>
  <line x1="450" y1="199" x2="480" y2="199" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowWhite)"/>
  <line x1="650" y1="199" x2="680" y2="199" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowWhite)"/>

  <!-- Actuators Section -->
  <rect x="30" y="320" width="520" height="90" rx="8" fill="none" stroke="#334155" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="50" y="342" fill="#94a3b8" font-size="12" font-weight="500">Actuators</text>

  <!-- Arduino #1 -->
  <rect x="80" y="350" width="200" height="48" rx="8" fill="#14352a" stroke="#22c55e" stroke-width="1" filter="url(#shadow)"/>
  <text x="180" y="370" fill="#86efac" font-size="13" font-weight="600" text-anchor="middle">Arduino Uno #1</text>
  <text x="180" y="387" fill="#64748b" font-size="10" text-anchor="middle">Motor Control + Encoders</text>

  <!-- Diff Drive -->
  <rect x="320" y="350" width="200" height="48" rx="8" fill="#1c1917" stroke="#78716c" stroke-width="1" filter="url(#shadow)"/>
  <text x="420" y="370" fill="#d6d3d1" font-size="13" font-weight="600" text-anchor="middle">Differential Drive</text>
  <text x="420" y="387" fill="#64748b" font-size="10" text-anchor="middle">2x DC Motor + Casters</text>

  <!-- Arrow Pi to Arduino -->
  <line x1="165" y1="281" x2="165" y2="350" stroke="#6ee7b7" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <line x1="280" y1="374" x2="320" y2="374" stroke="#78716c" stroke-width="1.5" marker-end="url(#arrowWhite)"/>

  <!-- Wireless Section -->
  <rect x="580" y="320" width="290" height="90" rx="8" fill="none" stroke="#334155" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="600" y="342" fill="#94a3b8" font-size="12" font-weight="500">Wireless Trigger</text>

  <!-- Arduino #2 + NRF -->
  <rect x="610" y="350" width="230" height="48" rx="8" fill="#451a03" stroke="#f97316" stroke-width="1" filter="url(#shadow)"/>
  <text x="725" y="370" fill="#fdba74" font-size="13" font-weight="600" text-anchor="middle">Arduino Uno #2 + NRF24L01</text>
  <text x="725" y="387" fill="#64748b" font-size="10" text-anchor="middle">Room Button Tx · 2.4 GHz · 98% reliability</text>

  <!-- Arrow NRF up -->
  <line x1="765" y1="223" x2="765" y2="350" stroke="#fdba74" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowOrange)"/>

  <!-- State Machine -->
  <rect x="30" y="430" width="840" height="70" rx="8" fill="none" stroke="#334155" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="50" y="452" fill="#94a3b8" font-size="12" font-weight="500">Navigation State Machine</text>

  <!-- States -->
  <rect x="80" y="460" width="90" height="30" rx="15" fill="#1e293b" stroke="#64748b" stroke-width="1"/>
  <text x="125" y="480" fill="#e2e8f0" font-size="11" font-weight="500" text-anchor="middle">Idle</text>

  <rect x="210" y="460" width="100" height="30" rx="15" fill="#1e293b" stroke="#f97316" stroke-width="1"/>
  <text x="260" y="480" fill="#fdba74" font-size="11" font-weight="500" text-anchor="middle">Receive</text>

  <rect x="350" y="460" width="100" height="30" rx="15" fill="#1e293b" stroke="#f97316" stroke-width="1"/>
  <text x="400" y="480" fill="#fdba74" font-size="11" font-weight="500" text-anchor="middle">Validate</text>

  <rect x="490" y="460" width="110" height="30" rx="15" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
  <text x="545" y="480" fill="#93c5fd" font-size="11" font-weight="500" text-anchor="middle">Navigate</text>

  <rect x="640" y="460" width="100" height="30" rx="15" fill="#1e293b" stroke="#22c55e" stroke-width="1"/>
  <text x="690" y="480" fill="#86efac" font-size="11" font-weight="500" text-anchor="middle">Arrived</text>

  <rect x="780" y="460" width="80" height="30" rx="15" fill="#1e293b" stroke="#ef4444" stroke-width="1"/>
  <text x="820" y="480" fill="#fca5a5" font-size="11" font-weight="500" text-anchor="middle">Error</text>

  <!-- State arrows -->
  <line x1="170" y1="475" x2="210" y2="475" stroke="#64748b" stroke-width="1" marker-end="url(#arrowWhite)"/>
  <line x1="310" y1="475" x2="350" y2="475" stroke="#64748b" stroke-width="1" marker-end="url(#arrowWhite)"/>
  <line x1="450" y1="475" x2="490" y2="475" stroke="#64748b" stroke-width="1" marker-end="url(#arrowWhite)"/>
  <line x1="600" y1="475" x2="640" y2="475" stroke="#64748b" stroke-width="1" marker-end="url(#arrowWhite)"/>
  <line x1="740" y1="475" x2="780" y2="475" stroke="#64748b" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrowWhite)"/>

  <!-- Legend -->
  <circle cx="60" cy="510" r="4" fill="#6ee7b7"/>
  <text x="70" y="514" fill="#64748b" font-size="10">Sensors / Odometry</text>
  <circle cx="210" cy="510" r="4" fill="#60a5fa"/>
  <text x="220" y="514" fill="#64748b" font-size="10">SLAM / Navigation</text>
  <circle cx="380" cy="510" r="4" fill="#fdba74"/>
  <text x="390" y="514" fill="#64748b" font-size="10">Wireless Command</text>
  <circle cx="540" cy="510" r="4" fill="#d6d3d1"/>
  <text x="550" y="514" fill="#64748b" font-size="10">Actuation</text>
</svg>

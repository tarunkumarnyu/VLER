<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#64748b"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#22c55e"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#f97316"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#a855f7"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1100" height="720" rx="12" fill="url(#bg)"/>

  <!-- Title -->
  <text x="550" y="38" text-anchor="middle" fill="#f8fafc" font-size="18" font-weight="700" letter-spacing="0.5">VLER — System Architecture</text>
  <text x="550" y="56" text-anchor="middle" fill="#94a3b8" font-size="11">Visual + LiDAR Exploration Robot · Autonomous Hospital Delivery</text>

  <!-- ════════════════ SENSORS LAYER ════════════════ -->
  <text x="42" y="92" fill="#94a3b8" font-size="10" font-weight="600" letter-spacing="1.5">SENSORS</text>
  <line x1="42" y1="98" x2="1058" y2="98" stroke="#334155" stroke-width="0.5"/>

  <!-- RPLIDAR -->
  <rect x="42" y="112" width="200" height="58" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="142" y="135" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">RPLIDAR C1</text>
  <text x="142" y="155" text-anchor="middle" fill="#64748b" font-size="10">2D LiDAR · 360° · 16m · 10 Hz</text>

  <!-- RealSense -->
  <rect x="290" y="112" width="200" height="58" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="390" y="135" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">Intel RealSense D435i</text>
  <text x="390" y="155" text-anchor="middle" fill="#64748b" font-size="10">RGB-D · 640×480 · 30 fps</text>

  <!-- Encoders -->
  <rect x="538" y="112" width="200" height="58" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="638" y="135" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">Wheel Encoders</text>
  <text x="638" y="155" text-anchor="middle" fill="#64748b" font-size="10">Differential Drive · Odometry</text>

  <!-- NRF Rx -->
  <rect x="786" y="112" width="270" height="58" rx="8" fill="#3b1f4e" stroke="#a855f7" stroke-width="1.5"/>
  <text x="921" y="135" text-anchor="middle" fill="#d8b4fe" font-size="13" font-weight="700">NRF24L01 Wireless Receiver</text>
  <text x="921" y="155" text-anchor="middle" fill="#64748b" font-size="10">2.4 GHz · Room Button Trigger · 98% reliability</text>

  <!-- ════════════════ COMPUTE LAYER ════════════════ -->
  <text x="42" y="210" fill="#94a3b8" font-size="10" font-weight="600" letter-spacing="1.5">COMPUTE · RASPBERRY PI 5 · UBUNTU 22.04 · ROS 2 HUMBLE</text>
  <line x1="42" y1="216" x2="1058" y2="216" stroke="#334155" stroke-width="0.5"/>

  <!-- Dashed border around compute -->
  <rect x="32" y="224" width="740" height="270" rx="10" fill="none" stroke="#475569" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- SLAM Toolbox -->
  <rect x="52" y="240" width="200" height="68" rx="8" fill="#14332b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="152" y="265" text-anchor="middle" fill="#86efac" font-size="13" font-weight="700">SLAM Toolbox</text>
  <text x="152" y="282" text-anchor="middle" fill="#64748b" font-size="10">Correlative Scan Matching</text>
  <text x="152" y="296" text-anchor="middle" fill="#64748b" font-size="10">2D Occupancy Grid · 20 Hz</text>

  <!-- RTAB-Map -->
  <rect x="290" y="240" width="200" height="68" rx="8" fill="#14332b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="390" y="265" text-anchor="middle" fill="#86efac" font-size="13" font-weight="700">RTAB-Map</text>
  <text x="390" y="282" text-anchor="middle" fill="#64748b" font-size="10">3D Point Cloud Mapping</text>
  <text x="390" y="296" text-anchor="middle" fill="#64748b" font-size="10">Loop Closure · KD-Tree</text>

  <!-- Nav2 -->
  <rect x="528" y="240" width="230" height="68" rx="8" fill="#3b2507" stroke="#f97316" stroke-width="1.5"/>
  <text x="643" y="265" text-anchor="middle" fill="#fdba74" font-size="13" font-weight="700">Nav2 Stack</text>
  <text x="643" y="282" text-anchor="middle" fill="#64748b" font-size="10">A* Global Planner</text>
  <text x="643" y="296" text-anchor="middle" fill="#64748b" font-size="10">DWA Local Planner · Costmap</text>

  <!-- ROS Nodes row -->
  <rect x="52" y="330" width="130" height="40" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="117" y="354" text-anchor="middle" fill="#94a3b8" font-size="10">odometry_node</text>

  <rect x="200" y="330" width="130" height="40" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="265" y="354" text-anchor="middle" fill="#94a3b8" font-size="10">map_manager</text>

  <rect x="348" y="330" width="130" height="40" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="413" y="354" text-anchor="middle" fill="#94a3b8" font-size="10">room_selector</text>

  <rect x="496" y="330" width="130" height="40" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="561" y="354" text-anchor="middle" fill="#94a3b8" font-size="10">costmap_2d</text>

  <rect x="644" y="330" width="115" height="40" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="701" y="354" text-anchor="middle" fill="#94a3b8" font-size="10">bt_navigator</text>

  <!-- nrf_receiver node -->
  <rect x="800" y="240" width="240" height="68" rx="8" fill="#3b1f4e" stroke="#a855f7" stroke-width="1.5"/>
  <text x="920" y="265" text-anchor="middle" fill="#d8b4fe" font-size="13" font-weight="700">nrf_receiver</text>
  <text x="920" y="282" text-anchor="middle" fill="#64748b" font-size="10">Room Command Rx · Serial</text>
  <text x="920" y="296" text-anchor="middle" fill="#64748b" font-size="10">Arduino Uno #2 · USB Bridge</text>

  <!-- ════════════════ ARROWS: Sensors → Compute ════════════════ -->
  <line x1="142" y1="170" x2="142" y2="236" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="390" y1="170" x2="390" y2="236" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <path d="M638,170 L638,200 L117,200 L117,326" fill="none" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="921" y1="170" x2="921" y2="236" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

  <!-- ════════════════ ARROWS: Internal Compute ════════════════ -->
  <line x1="252" y1="274" x2="286" y2="274" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="490" y1="274" x2="524" y2="274" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <line x1="800" y1="274" x2="762" y2="274" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-purple)"/>

  <!-- ════════════════ ACTUATORS LAYER ════════════════ -->
  <text x="42" y="418" fill="#94a3b8" font-size="10" font-weight="600" letter-spacing="1.5">ACTUATORS</text>
  <line x1="42" y1="424" x2="1058" y2="424" stroke="#334155" stroke-width="0.5"/>

  <!-- Arduino Uno #1 -->
  <rect x="52" y="440" width="230" height="58" rx="8" fill="#422006" stroke="#f97316" stroke-width="1.5"/>
  <text x="167" y="463" text-anchor="middle" fill="#fdba74" font-size="13" font-weight="700">Arduino Uno #1</text>
  <text x="167" y="483" text-anchor="middle" fill="#64748b" font-size="10">Motor Control · Encoder Readout · rosserial</text>

  <!-- Differential Drive -->
  <rect x="330" y="440" width="230" height="58" rx="8" fill="#1e293b" stroke="#64748b" stroke-width="1.5"/>
  <text x="445" y="463" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="700">Differential Drive</text>
  <text x="445" y="483" text-anchor="middle" fill="#64748b" font-size="10">2× DC Motors · 10:1 Gear · Caster Wheels</text>

  <!-- Arrows: Nav2 → Arduino → Drive -->
  <path d="M643,308 L643,390 L167,390 L167,436" fill="none" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <line x1="282" y1="469" x2="326" y2="469" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ════════════════ STATE MACHINE ════════════════ -->
  <text x="42" y="545" fill="#94a3b8" font-size="10" font-weight="600" letter-spacing="1.5">NAVIGATION STATE MACHINE</text>
  <line x1="42" y1="551" x2="1058" y2="551" stroke="#334155" stroke-width="0.5"/>

  <!-- State boxes -->
  <rect x="52" y="568" width="100" height="38" rx="19" fill="#1e293b" stroke="#64748b" stroke-width="1.2"/>
  <text x="102" y="592" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">Idle</text>

  <rect x="200" y="568" width="100" height="38" rx="19" fill="#1e293b" stroke="#a855f7" stroke-width="1.2"/>
  <text x="250" y="592" text-anchor="middle" fill="#d8b4fe" font-size="11" font-weight="600">Receive</text>

  <rect x="348" y="568" width="100" height="38" rx="19" fill="#1e293b" stroke="#a855f7" stroke-width="1.2"/>
  <text x="398" y="592" text-anchor="middle" fill="#d8b4fe" font-size="11" font-weight="600">Validate</text>

  <rect x="496" y="568" width="100" height="38" rx="19" fill="#1e293b" stroke="#f97316" stroke-width="1.2"/>
  <text x="546" y="592" text-anchor="middle" fill="#fdba74" font-size="11" font-weight="600">Navigate</text>

  <rect x="644" y="568" width="100" height="38" rx="19" fill="#14332b" stroke="#22c55e" stroke-width="1.2"/>
  <text x="694" y="592" text-anchor="middle" fill="#86efac" font-size="11" font-weight="600">Arrived</text>

  <rect x="800" y="568" width="100" height="38" rx="19" fill="#3b1520" stroke="#ef4444" stroke-width="1.2"/>
  <text x="850" y="592" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="600">Error</text>

  <!-- State arrows -->
  <line x1="152" y1="587" x2="196" y2="587" stroke="#64748b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="300" y1="587" x2="344" y2="587" stroke="#64748b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="448" y1="587" x2="492" y2="587" stroke="#64748b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="596" y1="587" x2="640" y2="587" stroke="#64748b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <!-- Error arrow from Navigate -->
  <path d="M546,606 L546,630 L850,630 L850,610" fill="none" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- ════════════════ LEGEND ════════════════ -->
  <rect x="42" y="660" width="1016" height="42" rx="6" fill="#0f172a" stroke="#334155" stroke-width="0.5"/>

  <circle cx="70" cy="681" r="5" fill="#3b82f6"/>
  <text x="82" y="685" fill="#94a3b8" font-size="10">Sensors</text>

  <circle cx="160" cy="681" r="5" fill="#22c55e"/>
  <text x="172" y="685" fill="#94a3b8" font-size="10">SLAM / Mapping</text>

  <circle cx="290" cy="681" r="5" fill="#f97316"/>
  <text x="302" y="685" fill="#94a3b8" font-size="10">Navigation</text>

  <circle cx="400" cy="681" r="5" fill="#a855f7"/>
  <text x="412" y="685" fill="#94a3b8" font-size="10">Wireless Command</text>

  <circle cx="540" cy="681" r="5" fill="#64748b"/>
  <text x="552" y="685" fill="#94a3b8" font-size="10">Actuation</text>

  <circle cx="640" cy="681" r="5" fill="#ef4444"/>
  <text x="652" y="685" fill="#94a3b8" font-size="10">Error State</text>

  <line x1="730" y1="681" x2="760" y2="681" stroke="#64748b" stroke-width="1.2"/>
  <text x="768" y="685" fill="#94a3b8" font-size="10">Data Flow</text>

  <line x1="850" y1="681" x2="880" y2="681" stroke="#64748b" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="888" y="685" fill="#94a3b8" font-size="10">Async / Command</text>
</svg>
